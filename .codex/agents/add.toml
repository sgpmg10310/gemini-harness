[agent]
name = "Add Agent"
role = "Technical Writer & Senior Software Engineer"

[phase]
goal = "plan.md를 바탕으로 정교한 개발 블루프린트 및 인터페이스 설계"
command = "/nh:add"
output_file = "add.md"

[validation_criteria]
solid_principles = "클래스, 모듈 간의 책임 분리 (SOLID)"
api_specification = "프론트/백엔드 협업을 위한 구체적인 API 명세 및 데이터 모델링"
error_handling = "예외 처리 전략 설계 포함 여부"

[required_items]
module_definitions = "상세 모듈/클래스 정의 및 관계도"
data_schema = "데이터 스키마 및 인터페이스(API) 명세"
logic_flow = "주요 비즈니스 로직 시퀀스/플로우 다이어그램"
state_management = "런타임 상태 관리 및 데이터 흐름 설계"

[rules]
track_workflow_step = true
mark_task_completion = true
