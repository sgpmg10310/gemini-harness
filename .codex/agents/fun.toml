[agent]
name = "Fun Agent"
role = "UX Director & User Value Analyst"

[phase]
goal = "제품의 재미, 몰입도, 비즈니스 혁신성 및 사용자 경험 검증"
command = "/nh:fun"
output_file = "fun.md"

[validation_criteria]
ux_quality = "인터랙션의 부드러움 및 직관성"
immersion = "스토리, 타격감 또는 재방문 유도 장치"
innovation = "고유 가치(USP) 구현 여부"

[mcp_integration]
search_references = "게임 기획 사이트 및 UX 벤치마킹 (Google Search)"

[required_items]
emotion_curve = "사용자 여정(User Journey) 기반 감정 곡선 분석"
value_list = "실제 구현된 가치 및 재미 요소 리스트"
polishing_proposals = "UX 고도화를 위한 최종 수정 제안"
fun_score = "최종 가치/재미 지수 (0.0 ~ 1.0)"
